<script>
document.addEventListener('DOMContentLoaded', () => {
	const astPanel = document.querySelector('#ast-panel');
	let codeElements =  Array.from(document.querySelectorAll('#code-panel > *'));

	astPanel.addEventListener('mouseover', (e) => {
		clearSelection()
		const target = e.target.closest('.ast-node');

		if (!target || !isDeepestNode(target)) return;

		selectASTNode(target)
	});

	astPanel.addEventListener('mouseleave', () => {
		clearSelection();
	});

	function applySelectionForBytecode(target) {
		clearSelection();
		const id = target.dataset.node;

		const node = document.querySelector('#' + id);
		if (node) {
			node.classList.add('selected');
			node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
			selectASTNode(node);
		}
	}
	document.querySelectorAll('.instruction').forEach(x => {
		x.addEventListener('mouseover', (e) => {
			applySelectionForBytecode(e.target.closest('.instruction'))
		});
		x.addEventListener('mouseleave', () => {
			clearSelection();
		});
	});

	function selectASTNode(target){
		const bpos = parseInt(target.dataset.bpos);
		const epos = parseInt(target.dataset.epos);

		applySelection(bpos, epos);
	};

  	function isDeepestNode(node) {
		return !node.querySelector(':hover .ast-node');
  	}

	function applySelection(startIndex, endIndex) {
		let first = true;
		for (let i = startIndex - 1; i < endIndex && i >= 0; i++) {
			if (codeElements[i]) {
				codeElements[i].classList.add('selected');
				if (first) {
					codeElements[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
				}
			}
		}
  	}

	function clearSelection() {
		document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
	}

	function hideVMStep(exception) {
		document.querySelectorAll('.vm-step').forEach(x => {
			if (x.id == exception)
				x.style.display = 'block';
			else
				x.style.display = 'none';
		})
	}

	function updateStep(id) {
		const el = document.querySelector('#'+id);
		if (el) {
			hideVMStep(id);
			const ip = el.dataset.ip
			clearSelection();

			const byt = document.querySelector(`.instruction[data-ip="${ip}"]`)
			
			applySelectionForBytecode(byt)
			byt.classList.add('selected');
			byt.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
		}
	}
	
	let steps = Array.from(document.querySelectorAll('.vm-step-select'))
	steps.forEach(x => {
		x.addEventListener('click', (e) => {
			const target = e.target.closest('.vm-step-select');
			const id = 'vm-step-' + target.dataset.target;
			updateStep(id)
		});
	})

	let stepCount = steps.length/4;

	hideVMStep('vm-step-1');
	updateStep('vm-step-1');

	document.querySelector('.vm-step-select[data-target="0"]').classList.add('disable')
	document.querySelector('#vm-step-1 .vm-step-select[data-target="1"]').classList.add('disable')
	document.querySelector(`.vm-step-select[data-target="${stepCount+1}"]`).classList.add('disable')
});

</script>
